<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080a10"/>
      <stop offset="50%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#080a10"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" stroke="#1a2535" stroke-width="0.2"/>
    </pattern>
  </defs>
  <rect width="900" height="200" fill="url(#bg)"/>
  <rect width="900" height="200" fill="url(#grid)" opacity="0.4"/>
  <rect x="0" y="0" width="4" height="200" fill="#f0a500" opacity="0.5"/>
  <text x="450" y="60" text-anchor="middle" font-family="Consolas, monospace" font-size="42" font-weight="700" fill="#f0a500" letter-spacing="-1">PublicEye</text>
  <text x="450" y="86" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8b949e">Open Source Intelligence Framework</text>
  <text x="450" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#484f58">Enterprise-grade OSINT platform for security professionals. On-prem deployable.</text>
  <rect x="155" y="128" width="70" height="20" rx="3" fill="#f0a50010" stroke="#f0a50030" stroke-width="0.8"/>
  <text x="190" y="141" text-anchor="middle" font-family="Consolas" font-size="9" font-weight="600" fill="#f0a500">8 Modules</text>
  <rect x="235" y="128" width="70" height="20" rx="3" fill="#f0a50010" stroke="#f0a50030" stroke-width="0.8"/>
  <text x="270" y="141" text-anchor="middle" font-family="Consolas" font-size="9" font-weight="600" fill="#f0a500">Domain</text>
  <rect x="315" y="128" width="60" height="20" rx="3" fill="#f0a50010" stroke="#f0a50030" stroke-width="0.8"/>
  <text x="345" y="141" text-anchor="middle" font-family="Consolas" font-size="9" font-weight="600" fill="#f0a500">SSL/TLS</text>
  <rect x="385" y="128" width="80" height="20" rx="3" fill="#f0a50010" stroke="#f0a50030" stroke-width="0.8"/>
  <text x="425" y="141" text-anchor="middle" font-family="Consolas" font-size="9" font-weight="600" fill="#f0a500">Subdomains</text>
  <rect x="475" y="128" width="50" height="20" rx="3" fill="#f0a50010" stroke="#f0a50030" stroke-width="0.8"/>
  <text x="500" y="141" text-anchor="middle" font-family="Consolas" font-size="9" font-weight="600" fill="#f0a500">Ports</text>
  <rect x="535" y="128" width="55" height="20" rx="3" fill="#f0a50010" stroke="#f0a50030" stroke-width="0.8"/>
  <text x="562" y="141" text-anchor="middle" font-family="Consolas" font-size="9" font-weight="600" fill="#f0a500">Email</text>
  <rect x="600" y="128" width="65" height="20" rx="3" fill="#f0a50010" stroke="#f0a50030" stroke-width="0.8"/>
  <text x="632" y="141" text-anchor="middle" font-family="Consolas" font-size="9" font-weight="600" fill="#f0a500">Social</text>
  <rect x="675" y="128" width="70" height="20" rx="3" fill="#f0a50010" stroke="#f0a50030" stroke-width="0.8"/>
  <text x="710" y="141" text-anchor="middle" font-family="Consolas" font-size="9" font-weight="600" fill="#f0a500">Tech FP</text>
  <text x="450" y="177" text-anchor="middle" font-family="Consolas" font-size="9" fill="#484f58">Python 3.8+  |  826 lines  |  8 modules  |  JSON/CSV/HTML reports  |  On-prem  |  MIT License</text>
</svg>
