name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: python -c "import ast; ast.parse(open('publiceye.py').read()); print('OK')"
      - name: Version check
        run: python publiceye.py --version
